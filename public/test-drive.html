<!DOCTYPE html>
<html>
<body>
<h2>Drive API Test</h2>
<button id="btn">Test POST</button>
<pre id="out">Click the button</pre>
<script>
document.getElementById('btn').onclick = function() {
  document.getElementById('out').textContent = 'Sending...';
  fetch('/api/drive/test', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({hello: 'world'})
  })
  .then(function(r) { return r.text(); })
  .then(function(t) { document.getElementById('out').textContent = t; })
  .catch(function(e) { document.getElementById('out').textContent = 'Error: ' + e.message; });
};
</script>
</body>
</html>
