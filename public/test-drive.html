<!DOCTYPE html>
<html>
<body>
<h2>Direct Google Drive Upload Test</h2>
<button id="btn">Test Upload to Drive</button>
<pre id="out">Click the button to test</pre>
<script>
document.getElementById('btn').onclick = async function() {
  var out = document.getElementById('out');
  out.textContent = 'Step 1: Getting token...';

  try {
    // Step 1: Get token from our server (tiny JSON)
    var tokenRes = await fetch('/api/drive/test', { method: 'POST' });
    var tokenData = await tokenRes.json();
    if (tokenData.error) throw new Error('Token: ' + tokenData.error);
    out.textContent = 'Step 1 OK. Step 2: Uploading to Google Drive...';

    // Step 2: Upload a tiny test file directly to Google Drive from browser
    var boundary = 'boundary123';
    var metadata = JSON.stringify({
      name: 'opshub-test-' + Date.now() + '.txt',
      parents: [tokenData.folderId]
    });
    var fileContent = 'Hello from OpsHub browser upload test';

    var body = '--' + boundary + '\r\n';
    body += 'Content-Type: application/json; charset=UTF-8\r\n\r\n';
    body += metadata + '\r\n';
    body += '--' + boundary + '\r\n';
    body += 'Content-Type: text/plain\r\n\r\n';
    body += fileContent + '\r\n';
    body += '--' + boundary + '--';

    var driveRes = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + tokenData.token,
        'Content-Type': 'multipart/related; boundary=' + boundary
      },
      body: body
    });

    var driveData = await driveRes.json();
    if (!driveRes.ok) throw new Error('Drive: ' + JSON.stringify(driveData));

    out.textContent = 'SUCCESS! File uploaded to Google Drive.\n\nFile ID: ' + driveData.id + '\nFile name: ' + driveData.name;
  } catch (e) {
    out.textContent = 'FAILED: ' + e.message;
  }
};
</script>
</body>
</html>
